<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>本を探す</title>
<style>
	body {
		font-family: 'Arial', 'Hiragino Sans', 'MS Pゴシック', sans-serif;
		max-width: 900px;
		margin: 0 auto;
		padding: 20px;
		background-color: #f1f8f3;
		color: #1B5E20;
	}
	
	.container {
		padding: 0;
	}
	
	h2 {
		font-size: 20px;
		margin: 0 0 20px 0;
		border-bottom: 3px solid #558B2F;
		padding-bottom: 10px;
		color: #1B5E20;
		font-weight: bold;
	}
	
	/* 検索フォーム */
	.search-section {
		margin-bottom: 30px;
		padding-bottom: 20px;
		border-bottom: 2px solid #a5d6a7;
	}
	
	.search-form {
		display: flex;
		gap: 10px;
		flex-wrap: wrap;
		align-items: center;
	}
	
	.search-form input,
	.search-form select {
		padding: 10px;
		border: 2px solid #a5d6a7;
		font-size: 14px;
		background-color: #ffffff;
		color: #1B5E20;
		border-radius: 4px;
	}

	.search-form input:focus,
	.search-form select:focus {
		outline: none;
		border-color: #558B2F;
		box-shadow: 0 0 5px rgba(85, 139, 47, 0.3);
	}
	
	.search-form input[type="text"] {
		flex: 1;
		min-width: 200px;
	}
	
	.search-form select {
		min-width: 150px;
	}
	
	.search-form button {
		padding: 10px 20px;
		border: 2px solid #558B2F;
		background: linear-gradient(135deg, #2E7D32 0%, #388E3C 100%);
		color: #ffffff;
		cursor: pointer;
		font-weight: bold;
		border-radius: 4px;
		transition: all 0.3s ease;
	}
	
	.search-form button:hover {
		background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 100%);
		box-shadow: 0 2px 8px rgba(27, 94, 32, 0.3);
	}
	
	/* テーブル */
	table {
		width: 100%;
		border-collapse: collapse;
		margin: 20px 0;
		background-color: #ffffff;
		box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
		border-radius: 6px;
		overflow: hidden;
	}
	
	table thead {
		border: 1px solid #a5d6a7;
	}
	
	table th {
		padding: 12px;
		text-align: left;
		font-weight: bold;
		background: linear-gradient(135deg, #2E7D32 0%, #388E3C 100%);
		color: #ffffff;
		border-right: 1px solid #1B5E20;
	}
	
	table th:last-child {
		border-right: none;
	}
	
	table td {
		padding: 12px;
		border: 1px solid #c8e6c9;
		color: #1B5E20;
		background-color: #f9fff8;
	}

	table tbody tr:nth-child(odd) td {
		background-color: #ffffff;
	}
	
	table tbody tr:hover td {
		background-color: #e8f5e9;
		transition: background-color 0.2s ease;
	}
	
	/* リンク */
	a {
		color: #2E7D32;
		text-decoration: none;
		transition: color 0.2s ease;
	}
	
	a:hover {
		color: #1B5E20;
		text-decoration: underline;
	}
	
	/* ステータス */
	.status-available {
		font-weight: bold;
		color: #2E7D32;
	}
	
	.status-borrowed {
		font-weight: bold;
		color: #d32f2f;
	}
	
	/* メッセージ */
	.no-results {
		padding: 15px;
		border: 2px solid #a5d6a7;
		margin: 20px 0;
		background-color: #ffffff;
		color: #1B5E20;
		border-radius: 4px;
	}
	
	/* ボタングループ */
	.button-group {
		margin-top: 20px;
		display: flex;
		gap: 10px;
	}
	
	.btn {
		padding: 10px 20px;
		border: 2px solid #558B2F;
		background: linear-gradient(135deg, #2E7D32 0%, #388E3C 100%);
		color: #ffffff;
		cursor: pointer;
		font-weight: bold;
		text-decoration: none;
		display: inline-block;
		border-radius: 4px;
		transition: all 0.3s ease;
	}
	
	.btn:hover {
		background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 100%);
		box-shadow: 0 2px 8px rgba(27, 94, 32, 0.3);
	}
</style>
</head>
<body>
	<div class="container">
		<!-- 検索セクション -->
		<div class="search-section">
		    <h2>本を探す</h2>
		    <form id="searchForm" method="POST" th:action="@{/user/search}" class="search-form">
				<input type="text" name="keyword" id="keyword" placeholder="タイトルまたは著者で検索" th:value="${keyword}">
				<select name="categoryId" id="categoryId">
					<option value="0">カテゴリを選択</option>
					<option th:each="category : ${categories}"
						th:value="${category.id}"
						th:text="${category.categoryName}"
						th:selected="${categoryId == category.id}">
					</option>
				</select>
				<button type="submit">検索</button>
		    </form>
		</div>
		<div class="button-group">
					<a class="btn" th:href="@{/user/}">ユーザーメニューに戻る</a>
		</div>

		<!-- 本一覧テーブル -->
		<table th:if="${!books.isEmpty()}">
			<thead>
				<tr>
					<th>ID</th>
					<th>タイトル</th>
					<th>著者</th>
					<th>出版社</th>
					<th>貸出状況</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="book : ${books}">
					<td th:text="${book.id}">ID</td>
					<td><a th:href="@{/user/books/{book_id}(book_id=${book.id})}" th:text="${book.title}"></a></td>
					<td th:text="${book.writer.writerName}">著者名</td>
					<td th:text="${book.publisher}">出版社</td>
					<td>
						<span th:if="${book.loans}" class="status-borrowed">貸出中</span>
						<span th:unless="${book.loans}" class="status-available">利用可能</span>
					</td>
				</tr>
			</tbody>
		</table>

		<!-- 検索結果がない場合 -->
		<div th:if="${books.isEmpty()}" class="no-results">
			<p>本が見つかりませんでした。</p>
		</div>
	</div>
</body>
</html>
