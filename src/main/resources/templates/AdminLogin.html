<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理者ログイン</title>
<link rel="stylesheet" href="/css/AdminLoginStyle.css">
</head>
<body>
	<div class="container">
		<h1>管理者ログイン</h1>

		<!-- エラーメッセージ -->
		<ul th:if="${con != null && !con.isEmpty()}" class="error-list">
			<li th:each="data:${con}">[[${data}]]</li>
		</ul>

		<div th:if="${message}" class="error-message">
			[[${message}]]
		</div>

		<!-- ログインフォーム -->
		<form action="/admin/login" method="post">
			<div class="form-group">
				<label for="email">メールアドレス</label>
				<input type="text" id="email" name="email" placeholder="メールアドレスを入力" th:value="${email}" required>
			</div>

			<div class="form-group">
				<label for="password">パスワード</label>
				<input type="password" id="password" name="password" placeholder="パスワードを入力" th:value="${password}" required>
			</div>

			<button type="submit">ログイン</button>
		</form>

		<!-- テストアカウント情報 -->
		<div class="test-account">
			<strong>📋 テストアカウント</strong>
			<p>master@example.com</p>
			<p>admin123</p>
		</div>
	</div>
</body>
</html>
