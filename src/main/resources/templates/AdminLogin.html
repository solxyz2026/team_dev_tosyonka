<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>ログイン</title>
</head>
<body>
<h1>ログイン</h1>

<li th:each="data:${con}" style="color:red;">[[${data}]]</li>
<span th:text="${message}" style="color:red;"></span>
<form action="/admin/login" method="post">
		メールアドレス<input type="text" name="email" th:value="${email}"><br>
		パスワード<input type="text" name="password"  th:value="${password}"><br>
		<button>ログイン</button>
	</form>
	
</body>
</html>
