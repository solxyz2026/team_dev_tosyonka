<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン</title>
<style>
	* {
		margin: 0;
		padding: 0;
		box-sizing: border-box;
	}

	body {
		font-family: 'Arial', 'Hiragino Sans', 'MS Pゴシック', sans-serif;
		background: linear-gradient(135deg, #e8f5e9 0%, #f1f8f3 100%);
		color: #1B5E20;
		display: flex;
		justify-content: center;
		align-items: center;
		min-height: 100vh;
		padding: 20px;
	}

	.container {
		background-color: #ffffff;
		padding: 40px;
		border-radius: 8px;
		box-shadow: 0 4px 12px rgba(27, 94, 32, 0.2);
		max-width: 400px;
		width: 100%;
		border: 2px solid #a5d6a7;
	}

	h1 {
		font-size: 28px;
		color: #1B5E20;
		text-align: center;
		margin-bottom: 10px;
		font-weight: bold;
	}

	.subtitle {
		text-align: center;
		color: #2E7D32;
		margin-bottom: 30px;
		font-size: 14px;
	}

	/* エラーメッセージ */
	.error-list {
		background-color: #ffebee;
		border: 2px solid #d32f2f;
		color: #d32f2f;
		padding: 15px;
		border-radius: 4px;
		margin-bottom: 20px;
		list-style-position: inside;
	}

	.error-list li {
		margin: 5px 0;
		font-weight: 500;
	}

	.error-message {
		color: #d32f2f;
		text-align: center;
		margin-bottom: 20px;
		font-weight: 500;
		padding: 10px;
		background-color: #ffebee;
		border-radius: 4px;
		border: 1px solid #ef5350;
	}

	/* フォーム */
	form {
		display: flex;
		flex-direction: column;
	}

	.form-group {
		margin-bottom: 20px;
		display: flex;
		flex-direction: column;
	}

	label {
		font-weight: bold;
		color: #1B5E20;
		margin-bottom: 8px;
		font-size: 14px;
	}

	input[type="text"],
	input[type="email"],
	input[type="password"] {
		padding: 12px;
		border: 2px solid #a5d6a7;
		border-radius: 4px;
		font-size: 14px;
		color: #1B5E20;
		background-color: #f9fff8;
		transition: all 0.3s ease;
	}

	input[type="text"]:focus,
	input[type="email"]:focus,
	input[type="password"]:focus {
		outline: none;
		border-color: #558B2F;
		background-color: #ffffff;
		box-shadow: 0 0 8px rgba(85, 139, 47, 0.3);
	}

	/* ボタン */
	button {
		padding: 12px;
		background: linear-gradient(135deg, #2E7D32 0%, #388E3C 100%);
		color: #ffffff;
		border: 2px solid #558B2F;
		border-radius: 4px;
		font-weight: bold;
		font-size: 16px;
		cursor: pointer;
		transition: all 0.3s ease;
		margin-top: 10px;
	}

	button:hover {
		background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 100%);
		box-shadow: 0 4px 12px rgba(27, 94, 32, 0.3);
	}

	button:active {
		transform: scale(0.98);
	}

	/* テストアカウント情報 */
	.test-account {
		background-color: #e8f5e9;
		border: 2px solid #a5d6a7;
		padding: 15px;
		border-radius: 4px;
		margin: 20px 0;
		font-size: 13px;
		color: #1B5E20;
	}

	.test-account strong {
		display: block;
		color: #2E7D32;
		margin-bottom: 8px;
		font-size: 14px;
	}

	.test-account p {
		margin: 5px 0;
		font-family: 'Courier New', monospace;
		background-color: #ffffff;
		padding: 8px;
		border-radius: 3px;
		border: 1px solid #c8e6c9;
	}

	/* リンク */
	.register-link {
		text-align: center;
		margin-top: 20px;
	}

	.register-link a {
		color: #2E7D32;
		text-decoration: none;
		font-weight: 500;
		transition: color 0.2s ease;
	}

	.register-link a:hover {
		color: #1B5E20;
		text-decoration: underline;
	}

	@media (max-width: 600px) {
		.container {
			padding: 30px 20px;
		}

		h1 {
			font-size: 24px;
		}
	}
</style>
</head>
<body>
	<div class="container">
		<h1>ログイン</h1>
		<div class="subtitle">としょんか</div>

		<!-- エラーメッセージ -->
		<ul th:if="${con != null && !con.isEmpty()}" class="error-list">
			<li th:each="data:${con}">[[${data}]]</li>
		</ul>

		<div th:if="${message}" class="error-message">
			[[${message}]]
		</div>

		<!-- ログインフォーム -->
		<form action="/user/login" method="post">
			<div class="form-group">
				<label for="email">メールアドレス</label>
				<input type="text" id="email" name="email" placeholder="メールアドレスを入力" th:value="${email}" required>
			</div>

			<div class="form-group">
				<label for="password">パスワード</label>
				<input type="password" id="password" name="password" placeholder="パスワードを入力" th:value="${password}" required>
			</div>

			<button type="submit">ログイン</button>
		</form>

		<!-- テストアカウント情報 -->
		<div class="test-account">
			<strong>📋 テストアカウント</strong>
			<p>Email: yamada@example.com</p>
			<p>Password: password123</p>
		</div>

		<!-- 新規会員登録リンク -->
		<div class="register-link">
			<a href="/user/register">新規会員登録はこちら</a>
		</div>
	</div>
</body>
</html>
