<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カテゴリーの追加</title>
<link rel="stylesheet" href="/css/CategoryAddStyle.css">
</head>
<body>
	<div class="layout">
		<div class="side">
			<div class="site-title">としょんか</div>
			<a href="/admin/logout">ログアウト</a>
			<a href="/admin/">ホーム画面</a>
			<a href="/admin/search">在庫一覧</a>
			<a href="/admin/books/add">本追加</a>
			<a href="/admin/writers">著者の追加</a>
			<a href="/admin/reservations">予約一覧</a>
			<a href="/admin/rental">貸し出し状況</a>
			<a href="/admin/writers/list">著者一覧</a>
			<a href="/admin/users">利用者一覧</a>
			<a href="/admin/announcement">お知らせ</a>
		</div>

		<div class="main">
			<h1>カテゴリーの追加</h1>

			<!-- メッセージ表示 -->
			<div th:if="${message}" class="message" th:classappend="${#strings.contains(message, 'エラー')} ? 'error'">
				[[${message}]]
			</div>

			<!-- カテゴリー追加フォーム -->
			<form action="/admin/categories" method="post">
				<div class="form-group">
					<label for="categoryName">カテゴリー名 <span style="color: #d32f2f;">*</span></label>
					<input type="text" id="categoryName" name="categoryName" placeholder="カテゴリー名を入力">
				</div>

				<button type="submit">登録</button>
			</form>
		</div>
	</div>
</body>
</html>
