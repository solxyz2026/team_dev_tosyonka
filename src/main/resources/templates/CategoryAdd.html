<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カテゴリーの追加</title>
<link rel="stylesheet" href="/css/CategoryAddStyle.css">
</head>
<body>
	<div class="container">
		<h1>カテゴリーの追加</h1>

		<!-- メッセージ表示 -->
		<div th:if="${message}" class="message" th:classappend="${#strings.contains(message, 'エラー')} ? 'error'">
			[[${message}]]
		</div>

		<!-- 戻るボタン -->
		<a class="btn-back" th:href="@{/admin/}">管理者メニューに戻る</a>

		<!-- カテゴリー追加フォーム -->
		<form action="/admin/categories" method="post">
			<div class="form-group">
				<label for="categoryName">カテゴリー名 <span style="color: #d32f2f;">*</span></label>
				<input type="text" id="categoryName" name="categoryName" placeholder="カテゴリー名を入力" required>
			</div>

			<button type="submit">登録</button>
		</form>
	</div>
</body>
</html>
