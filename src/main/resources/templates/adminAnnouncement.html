<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お知らせ一覧</title>
<link rel="stylesheet" href="/css/AdminAnnouncementStyle.css">

<script>
	let targetForm = null;

	function openModal(event, form, message) {
		event.preventDefault();
		targetForm = form;

		document.getElementById("modalMessage").innerText = message;
		document.getElementById("confirmModal").classList.add("show");

		return false;
	}

	function closeModal() {
		document.getElementById("confirmModal").classList.remove("show");
		targetForm = null;
	}

	function executeModal() {
		if (targetForm) {
			targetForm.submit();
		}
	}
</script>

</head>
<body>

<div class="layout">
	<!-- サイドナビ -->
	<div class="side">
		<div class="site-title">としょんか</div>
		<a href="/admin/">ホーム画面</a>
		<a href="/admin/logout">ログアウト</a>
		<a href="/admin/search">在庫一覧</a>
		<a href="/admin/books/add">本追加</a>
		<a href="/admin/writers">著者の追加</a>
		<a href="/admin/categories">カテゴリー追加</a>
		<a href="/admin/reservations">予約一覧</a>
		<a href="/admin/rental">貸し出し状況</a>
		<a href="/admin/writers/list">著者一覧</a>
		<a href="/admin/users">利用者一覧</a>
		<a href="/admin/announcement">お知らせ</a>
	</div>

	<div class="main">
		<div class="header-section">
			<h1>📰 お知らせ一覧</h1>
			<p class="subtitle">利用者向けのお知らせを管理します</p>
		</div>

		<div th:if="${msg}" class="message success">
			<span th:text="${msg}"></span>
		</div>

		<div th:if="${error}" class="message error">
			<span th:text="${error}"></span>
		</div>

		<form action="/admin/announcement/add" method="get">
			<button class="btn">＋ お知らせ追加</button>
		</form>

		<table>
			<thead>
				<tr>
					<th>お知らせ</th>
					<th class="col-action">削除</th>
				</tr>
			</thead>

			<tbody>
				<tr th:each="announce : ${news}">
					<td th:text="${announce.content}"></td>
					<td class="col-action">

						<form th:action="|/admin/announcement/${announce.id}/delete|"
							  method="post"
							  onsubmit="return openModal(event,this,'削除しますか？');">

							<button class="btn btn-delete">削除</button>
						</form>

					</td>
				</tr>

				<tr th:if="${news == null || news.isEmpty()}">
					<td colspan="2" class="empty-row">
						現在お知らせはありません。
					</td>
				</tr>
			</tbody>
		</table>
	</div>
</div>

<!-- =========================
     青モーダル
========================= -->
<div id="confirmModal" class="custom-modal">
	<div class="custom-modal-content">

		<div class="custom-modal-header">
			確認
		</div>

		<div class="custom-modal-body">
			<p id="modalMessage">実行しますか？</p>
		</div>

		<div class="custom-modal-footer">
			<button type="button" class="modal-btn cancel-btn" onclick="closeModal()">
				キャンセル
			</button>
			<button type="button" class="modal-btn ok-btn" onclick="executeModal()">
				OK
			</button>
		</div>

	</div>
</div>

</body>
</html>
