<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>ユーザメイン画面</title>
<link rel="stylesheet" href="/css/userMenuStyle.css">
</head>
<body>
	<!--左ナビゲーション-->
	<div class="sidebar">
		<div class="site-title">としょんか</div>
		<a href="/user/logout">ログアウト</a>
		<a href="/user/mypage">マイページ</a>
		<a href="/user/reservations">予約</a>
		<a href="/user/search">本検索</a>
	</div>

	<!--ヘッダー-->
	<h1>としょんか</h1>

	<!--メインコンテンツ（2列レイアウト）-->
	<div class="main-container">
		
		<!--左列：お知らせ＆カレンダー-->
		<div class="column column-left">
			<div class="section-title">お知らせ</div>
			<table border="1">
				<tr th:each="news:${newsList}">
					<td>[[${news.content}]]</td>
				</tr>
			</table>

			<!-- ========================================
			     カレンダーセクション
			     ======================================== -->
			<div class="calendar-section">
				<div class="calendar-wrap"
				     id="calendar-data"
				     th:attr="data-deadlines=${deadlinesJson}">
					<!-- カレンダーヘッダー（月日表示） -->
					<div class="calendar-header">
						<button id="prev-month" class="nav-btn nav-prev" aria-label="前月">&#9664;</button>
						<span id="calendar-month-year" class="month-year-display">2026年1月</span>
						<button id="next-month" class="nav-btn nav-next" aria-label="翌月">&#9654;</button>
					</div>

					<!-- カレンダーテーブル -->
					<div id="calendar-container"></div>

					<!-- 注意書き（◆と定休日の説明） -->
					<div class="calendar-note">
						<span class="note-mark">◆</span>＝返却期限
						<span class="note-closed">■</span>＝定休日（月曜）
					</div>
				</div>
			</div>
		</div>

		<!--右列：予約状況・リマインド・図書館情報-->
		<div class="column column-right">
			
			<!--リマインド-->
			<div class="info-box" id="reminder-box" style="display: none;">
				<strong>リマインド</strong><br>
				<span id="reminder-message">明日までに以下の本を返却してください。</span>
				<ul id="reminder-list" style="margin: 10px 0 0 20px;">
					<!-- JavaScriptで動的に追加 -->
				</ul>
			</div>

			<!-- 予約状況 -->
			<div class="section-title">予約状況</div>
			<table border="1">
			    <tr>
			        <th>本のタイトル</th>
			        <th>状況</th>
			    </tr>

			    <!-- 予約データ表示 -->
			    <th:block th:each="reservationList : ${reservationsList}">
			        <tr th:each="reservationdetails : ${reservationList.reservationdetails}">
			            <td>[[${reservationdetails.book.title}]]</td>
			            <td>[[${reservationdetails.status}]]</td>
			        </tr>
			    </th:block>

			    <!-- 予約がない場合 -->
			    <tr th:if="${reservationsList == null || reservationsList.isEmpty()}">
			        <td colspan="2" class="empty-message">
						<p>現在予約されている本はありません。</p>
					</td>
			    </tr>
			</table>

			<!--アクセス情報-->
			<div class="info-box">
				<strong>アクセス</strong>&nbsp;&nbsp;○○県○○町1－1－1<br>
				<strong>営業時間</strong>&nbsp;&nbsp;9:00 ～ 17:00<br>
				<strong>定休日</strong>&nbsp;&nbsp;月曜日
			</div>

			<!--図書館説明-->
			<div class="info-box">
				<strong>図書館の説明</strong><br>
				広々とした読書スペースがあり、ゆったりとした時間が過ごせます。
			</div>

		</div>

	</div>

	<!-- リマインダー用の隠しデータ要素 -->
	<div id="data-container" 
	     th:attr="data-rental-size=${rentalSize}"
	     style="display:none;"></div>

	<!-- リマインダー用データ -->
	<script th:inline="javascript">
		/*<![CDATA[*/
		window.REMINDER_DATA = {
			rentalSize: /*[[${rentalSize}]]*/ 0,
			reminderBooks: /*[[${reminderBooks}]]*/ []
		};
		/*]]>*/
	</script>

	<!-- カレンダー機能 -->
	<script>
		class InteractiveCalendar {
			constructor() {
				this.currentDate = new Date();
				this.todayDate = new Date();

				this.monthYearDisplay = document.getElementById('calendar-month-year');
				this.calendarContainer = document.getElementById('calendar-container');
				this.prevBtn = document.getElementById('prev-month');
				this.nextBtn = document.getElementById('next-month');

				this.deadlinesByMonth = this.loadDeadlines();

				this.prevBtn.addEventListener('click', () => this.previousMonth());
				this.nextBtn.addEventListener('click', () => this.nextMonth());

				this.render();
			}

			loadDeadlines() {
				const dataEl = document.getElementById('calendar-data');
				if (!dataEl) {
					console.warn('カレンダーデータ要素が見つかりません');
					return {};
				}

				const raw = dataEl.getAttribute('data-deadlines');
				console.log('【カレンダー】data-deadlines 生データ:', raw);

				if (!raw || raw.trim() === '' || raw === 'null') {
					console.log('【カレンダー】期限データなし');
					return {};
				}

				try {
					const parsed = JSON.parse(raw);
					console.log('【カレンダー】パース成功:', parsed);
					return parsed;
				} catch (e) {
					console.error('【カレンダー】JSONパース失敗:', e.message);
					console.error('  → 生データ:', raw);
					return {};
				}
			}

			previousMonth() {
				this.currentDate.setMonth(this.currentDate.getMonth() - 1);
				this.render();
			}

			nextMonth() {
				this.currentDate.setMonth(this.currentDate.getMonth() + 1);
				this.render();
			}

			updateHeader() {
				const year = this.currentDate.getFullYear();
				const month = this.currentDate.getMonth() + 1;
				const monthStr = String(month).padStart(2, '0');
				this.monthYearDisplay.textContent = `${year}年${monthStr}月`;
			}

			getDeadlineCount(day, year, month) {
				const monthKey = `${year}-${String(month + 1).padStart(2, '0')}`;
				if (this.deadlinesByMonth[monthKey]) {
					const list = this.deadlinesByMonth[monthKey];
					return list.filter(d => d === String(day) || d === day).length;
				}
				return 0;
			}

			render() {
				this.updateHeader();

				const year = this.currentDate.getFullYear();
				const month = this.currentDate.getMonth();
				const firstDay = new Date(year, month, 1).getDay();
				const lastDay = new Date(year, month + 1, 0).getDate();
				const prevLastDay = new Date(year, month, 0).getDate();

				let html = '<table class="calendar-table">';

				// 曜日ヘッダー
				html += '<thead><tr>';
				const dayLabels = ['日', '月', '火', '水', '木', '金', '土'];
				dayLabels.forEach((label, index) => {
					if (index === 0) {
						html += `<th class="day-header sunday">${label}</th>`;
					} else if (index === 6) {
						html += `<th class="day-header saturday">${label}</th>`;
					} else if (index === 1) {
						html += `<th class="day-header closed-header">${label}</th>`;
					} else {
						html += `<th class="day-header">${label}</th>`;
					}
				});
				html += '</tr></thead>';

				// カレンダー本体
				html += '<tbody>';
				let dayCount = 1;
				let isMonthStarted = false;

				for (let week = 0; week < 6; week++) {
					html += '<tr>';

					for (let day = 0; day < 7; day++) {
						if (!isMonthStarted && day < firstDay) {
							const prevDate = prevLastDay - (firstDay - day - 1);
							html += `<td class="other-month">${prevDate}</td>`;
						} else if (dayCount <= lastDay) {
							isMonthStarted = true;

							let cellClass = 'calendar-day';
							let cellContent = `<div class="day-number">${dayCount}</div>`;

							if (this.isSameDate(dayCount, year, month)) {
								cellClass += ' today';
								cellContent += '<div class="today-indicator">本日</div>';
							}

							const count = this.getDeadlineCount(dayCount, year, month);
							if (count > 0) {
								cellClass += ' has-deadline';
								if (count >= 2) {
									cellContent += `<div class="deadline-indicator" style="color: red;">◆<span class="deadline-count">×${count}</span></div>`;
								} else {
									cellContent += '<div class="deadline-indicator" style="color: red;">◆</div>';
								}
							}

							if (day === 0) cellClass += ' sunday';
							if (day === 6) cellClass += ' saturday';
							// 月曜日は定休日
							if (day === 1) {
								cellClass += ' closed-day';
								cellContent += '<div class="closed-indicator">定休日</div>';
							}

							html += `<td class="${cellClass}">${cellContent}</td>`;
							dayCount++;
						} else {
							const nextDate = dayCount - lastDay;
							html += `<td class="other-month">${nextDate}</td>`;
							dayCount++;
						}
					}

					html += '</tr>';

					if (dayCount > lastDay && isMonthStarted) {
						break;
					}
				}

				html += '</tbody></table>';
				this.calendarContainer.innerHTML = html;
			}

			isSameDate(day, year, month) {
				return day === this.todayDate.getDate() &&
					   year === this.todayDate.getFullYear() &&
					   month === this.todayDate.getMonth();
			}
		}

		function initReminder() {
			const data = window.REMINDER_DATA || { rentalSize: 0, reminderBooks: [] };
			const rentalSize = data.rentalSize;
			const reminderBooks = data.reminderBooks;

			console.log('【リマインダー】rentalSize:', rentalSize, 'books:', reminderBooks);

			if (rentalSize > 0 && Array.isArray(reminderBooks) && reminderBooks.length > 0) {
				let alertMessage = '【リマインド】\n明日までに以下の本を返却してください。\n\n';
				reminderBooks.forEach(function(bookTitle) {
					alertMessage += '・' + bookTitle + '\n';
				});
				alert(alertMessage);
			}
		}

		document.addEventListener('DOMContentLoaded', () => {
			console.log('【初期化】DOMContentLoaded');
			try {
				new InteractiveCalendar();
				console.log('✓ カレンダー初期化成功');
			} catch (e) {
				console.error('✗ カレンダー初期化失敗:', e);
			}
			initReminder();
		});
	</script>
</body>
</html>
