<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>ユーザメイン画面</title>
<link rel="stylesheet" href="/css/userMenuStyle.css">

</head>
<body>
	<!--左ナビゲーション-->
	<div class="sidebar">
		<div class="site-title">としょんか</div>
		<a href="/user/logout">ログアウト</a>
		<a href="/user/mypage">マイページ</a>
		<a href="/user/reservations">予約</a>
		<a href="/user/search">本検索</a>
		
	</div>

	<!--ヘッダー-->
	<h1>としょんか</h1>

	<!--メインコンテンツ（2列レイアウト）-->
	<div class="main-container">
		
		<!--左列：お知らせ＆カレンダー-->
		<div class="column column-left">
			<div class="section-title">お知らせ</div>
			<table border="1">
				<tr th:each="news:${newsList}">
					<td>[[${news.content}]]</td>
				</tr>
			</table>

			<div id="calendar" class="calendar-wrap"></div>
		</div>

		<!--右列：予約状況・リマインド・図書館情報-->
		<div class="column column-right">
			
			<!--リマインド-->
			<div class="info-box" id="reminder-box" style="display: none;">
				<strong>リマインド</strong><br>
				<span id="reminder-message">明日までに以下の本を返却してください。</span>
				<ul id="reminder-list" style="margin: 10px 0 0 20px;">
					<!-- JavaScriptで動的に追加 -->
				</ul>
			</div>

			<!-- 予約状況 -->
			<div class="section-title">予約状況</div>
			<table border="1">
			    <tr>
			        <th>本のタイトル</th>
			        <th>状況</th>
			    </tr>

			    <!-- 予約データ表示 -->
			    <th:block th:each="reservationList : ${reservationsList}">
			        <tr th:each="reservationdetails : ${reservationList.reservationdetails}">
			            <td>[[${reservationdetails.book.title}]]</td>
			            <td>[[${reservationdetails.status}]]</td>
			        </tr>
			    </th:block>

			    <!-- 予約がない場合 -->
			    <tr th:if="${reservationsList == null || reservationsList.isEmpty()}">
			        <td colspan="2" class="empty-message">
						<p>現在予約されている本はありません。</p>
					</td>
			    </tr>
			</table>

			<!--アクセス情報-->
			<div class="info-box">
				<strong>アクセス</strong>&nbsp;&nbsp;○○県○○町1－1－1<br>
				<strong>営業時間</strong>&nbsp;&nbsp;9:00 ～ 17:00<br>
				<strong>定休日</strong>&nbsp;&nbsp;月曜日（祝日除く）、第二木曜日
			</div>

			<!--図書館説明-->
			<div class="info-box">
				<strong>図書館の説明</strong><br>
				広々とした読書スペースがあり、ゆったりとした時間が過ごせます。
			</div>

		</div>

	</div>

	<!-- ========================================
	     リマインダー用の隠しデータ要素
	     （Thymeleafでデータを埋め込む）
	     ======================================== -->
	<div id="data-container" 
	     data-rental-size="[[${rentalSize}]]"
	     data-reminder-books="[[${#lists.isEmpty(reminderBooks) ? '' : #lists.toList(reminderBooks)}]]"
	     style="display:none;"></div>

	<script th:inline="javascript">
		const date = new Date();
		const today = date.getDate();
		const currentMonth = date.getMonth();

		function createCalendar(month) {
		    const monthDays = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
		    let calendarHTML = '<table class="calendar"><thead><tr>';

		    for (let i = 0; i < 7; i++) {
		        if (i === 0) {
		            calendarHTML += `<th class="sun">${monthDays[i]}</th>`;
		        } else if (i === 6) {
		            calendarHTML += `<th class="sat">${monthDays[i]}</th>`;
		        } else {
		            calendarHTML += `<th>${monthDays[i]}</th>`;
		        }
		    }

		    calendarHTML += '</tr></thead><tbody>';

		    const daysInMonth = new Date(date.getFullYear(), month + 1, 0).getDate();
		    const firstDay = new Date(date.getFullYear(), month, 1).getDay();

		    const daysInPrevMonth = new Date(date.getFullYear(), month, 0).getDate();

		    let dayCount = 1;
		    let prevDayCount = daysInPrevMonth - firstDay + 1;

		    for (let i = 0; i < 6; i++) {
		        calendarHTML += '<tr>';

		        for (let j = 0; j < 7; j++) {
		            if (i === 0 && j < firstDay) {
		                calendarHTML += `<td class="mute">${prevDayCount}</td>`;
		                prevDayCount++;
		            } else if (dayCount > daysInMonth) {
		                let nextMonthDayCount = dayCount - daysInMonth;
		                calendarHTML += `<td class="mute">${nextMonthDayCount}</td>`;
		                dayCount++;
		            } else {
		                // 今日の日付にclassを付ける
		                if (dayCount === today && month === currentMonth) {
		                    calendarHTML += `<td class="today">${dayCount}</td>`;
		                } 
		                // 月曜日にclassを付ける
		                else if (j === 1) {
		                    calendarHTML += `<td class="off">${dayCount}</td>`;
		                } else {
		                    calendarHTML += `<td>${dayCount}</td>`;
		                }
		                dayCount++;
		            }
		        }

		        calendarHTML += '</tr>';

		        if (dayCount - daysInMonth > 7) {
		            break;
		        }
		    }

		    calendarHTML += '</tbody></table>';

		    return calendarHTML;
		}

		document.getElementById('calendar').innerHTML = createCalendar(currentMonth);

		// ========================================
		// リマインド表示（アラート版）
		// ========================================
		(function() {
			// DOMContentLoadedで実行
			function initReminder() {
				// Thymeleafから直接取得
				const rentalSize = /*[[${rentalSize}]]*/ 0;
				const reminderBooks = /*[[${reminderBooks}]]*/ [];

				console.log('【リマインダーデバッグ】');
				console.log('rentalSize:', rentalSize);
				console.log('reminderBooks:', reminderBooks);

				// 返却本がある場合
				if (rentalSize > 0 && reminderBooks && Array.isArray(reminderBooks) && reminderBooks.length > 0) {
					console.log('✓ リマインダーアラートを表示します');
					
					// アラートメッセージを組立
					let alertMessage = '【リマインド】\n明日までに以下の本を返却してください。\n\n';
					
					reminderBooks.forEach(function(bookTitle, index) {
						alertMessage += '・' + bookTitle + '\n';
						console.log('  対象:' + (index + 1) + '番目 - ' + bookTitle);
					});

					// アラートを表示
					alert(alertMessage);
					console.log('✓ リマインダーアラートを表示しました');
				} else {
					console.log('✗ リマインダーアラートは表示されません');
					console.log('  理由:', rentalSize <= 0 ? '返却本がない' : 'データが空');
				}
			}

			// ページ読み込み完了後に実行
			if (document.readyState === 'loading') {
				document.addEventListener('DOMContentLoaded', initReminder);
			} else {
				initReminder();
			}
		})();
	</script>
</body>
</html>
