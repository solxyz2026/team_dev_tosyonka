<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>本詳細</title>
	<link rel="stylesheet" href="/css/BookDetailStyle.css">
</head>

<body>
	<!-- 予約確認モーダル -->
	<div id="reserve-modal" class="popup-overlay">
		<div class="popup-content">
			<div class="popup-header">
				📚 予約確認
			</div>
			<div class="popup-body">
				<p>
					「<span th:text="${book.title}"></span>」
					を予約カートへ追加しますか？
				</p>
			</div>
			<div class="popup-footer">
				<button class="popup-btn cancel-btn"
					onclick="closeReserveModal()">
					キャンセル
				</button>
				<a class="popup-btn confirm-btn"
				   th:href="@{/user/reservation/{book_id}(book_id=${book.id})}">
					追加する
				</a>
			</div>
		</div>
	</div>
	<div class="container">
		<!-- メッセージ表示 -->
		<div th:if="${message}" class="message">
			✅ [[${message}]]
		</div>

		<!-- エラーメッセージ -->
		<div th:if="${error}" class="error">
			❌ [[${error}]]
			<a class="btn" th:href="@{/user/search}">検索ページに戻る</a>
		</div>

		<!-- 本の詳細情報 -->
		<div th:if="${book}">
			<!-- タイトル -->
			<h1 th:text="${book.title}">本のタイトル</h1>
			
			<form th:action="|/user/likebook/${book.id}/add|" method="post" class="like-form">
			    <button type="submit" class="like-btn">
			        <span class="like-icon">♡</span>
			        <span class="like-text">お気に入り</span>
			    </button>
			</form>
			<!-- 詳細情報テーブル -->
			<table>
				<tr>
					<th>ID</th>
					<td th:text="${book.id}">1</td>
				</tr>
				<tr>
					<th>著者</th>
					<td th:text="${book.writer.writerName}">著者名</td>
				</tr>
				<tr>
					<th>著者説明</th>
					<td th:text="${book.writer.writerDescription}">著者の説明文</td>
				</tr>
				<tr>
					<th>出版社</th>
					<td th:text="${book.publisher}">出版社名</td>
				</tr>
				<tr>
					<th>出版日</th>
					<td th:text="${book.date}">2020-01-01</td>
				</tr>
				<tr>
					<th>カテゴリ</th>
					<td th:text="${book.category.categoryName}">カテゴリ名</td>
				</tr>
				<tr>
					<th>貸出状況</th>
					<td>
						<span th:if="${book.loans}" class="status-borrowed">貸出中</span>
						<span th:unless="${book.loans}" class="status-available">利用可能</span>
					</td>
				</tr>
			</table>

			<!-- 本の説明セクション -->
			<div th:if="${book.summary}" class="summary-section">
				<h3>本の説明</h3>
				<p th:text="${book.summary}">本の説明文がここに表示されます。</p>
			</div>

			<!-- レビュー -->
			<h3 class="review-title">レビュー</h3>
			<table border="1">
				<tr th:each="review:${reviews}">
					<td><img src="/image/kkrn_icon_user_1.png" alt="画像なし" class="icon">　[(${review.bookReview})]</td>
				</tr>
				<tr th:if="${reviews == null || reviews.isEmpty()}">
					<td class="empty-review">まだレビューはありません。</td>
				</tr>
			</table>

			<!-- ボタングループ -->
			<div class="button-group">
				<a th:href="|/user/${book.id}/review|" class="btn btn-reserve">✒️ レビューを書く</a>
				<a class="btn btn-reserve"
				   href="#"
				   onclick="openReserveModal(event)">
				   📌 予約カートに追加
				</a>
				<a class="btn" th:href="@{/user/reservations}">今すぐ予約する</a>
				<a class="btn" th:href="@{/user/search}">検索ページに戻る</a>
				<a class="btn" th:href="@{/user/}">ユーザーメニューに戻る</a>
			</div>
		</div>
	</div>
	
	<script>
	function openReserveModal(event) {
		event.preventDefault();
		document.getElementById("reserve-modal")
			.classList.add("show");
	}
	function closeReserveModal() {
		document.getElementById("reserve-modal")
			.classList.remove("show");
	}
	window.onclick = function(event) {
		const modal =
			document.getElementById("reserve-modal");
		if(event.target === modal){
			closeReserveModal();
		}
	}
	</script>
</body>

</html>
