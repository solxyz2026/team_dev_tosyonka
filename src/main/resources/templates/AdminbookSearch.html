<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>在庫一覧</title>
<link rel="stylesheet" href="/css/AdminbookSearchStyle.css">
</head>
<body>
	<div class="layout">
		<!-- サイドバー -->
		<div class="side">
			<div class="site-title">としょんか</div>
			<a href="/admin/logout">ログアウト</a>
			<a href="/admin/">ホーム画面</a>
			<a href="/admin/books/add">本追加</a>
			<a href="/admin/writers">著者の追加</a>
			<a href="/admin/categories">カテゴリー追加</a>
			<a href="/admin/reservations">予約一覧</a>
			<a href="/admin/rental">貸し出し状況</a>
			<a href="/admin/writers/list">著者一覧</a>
			<a href="/admin/users">利用者一覧</a>
		</div>

		<!-- メインコンテンツ -->
		<div class="main">
			<div class="search-section">
			    <h2>本を探す</h2>
			    <form id="searchForm" method="POST" th:action="@{/admin/search}" class="search-form">
					<input type="text" name="keyword" id="keyword" placeholder="タイトルまたは著者で検索" th:value="${keyword}">
					<select name="categoryId" id="categoryId">
						<option value="0">カテゴリを選択</option>
						<option th:each="category : ${categories}"
							th:value="${category.id}"
							th:text="${category.categoryName}"
							th:selected="${categoryId == category.id}">
						</option>
					</select>
					<button type="submit">検索</button>
			    </form>
			</div>

			<!-- 本一覧 -->
			<table th:if="${!books.isEmpty()}">
				<thead>
					<tr>
						<th>ID</th>
						<th>タイトル</th>
						<th>著者</th>
						<th>出版社</th>
						<th>カテゴリー</th>
						<th>貸出状況</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="book : ${books}">
						<td th:text="${book.id}">ID</td>
						<td><a th:href="@{/admin/books/{bookId}(bookId=${book.id})}">[[${book.title}]]</a></td>
						<td th:text="${book.writer.writerName}">著者名</td>
						<td th:text="${book.publisher}">出版社</td>
						<td th:text="${book.category.categoryName}">カテゴリー</td>
						<td>
							<span th:if="${book.loans}" class="status-borrowed">貸出中</span>
							<span th:unless="${book.loans}" class="status-available">利用可能</span>
						</td>
					</tr>
				</tbody>
			</table>

			<div th:if="${books.isEmpty()}" class="no-results">
				<p>本が見つかりませんでした。</p>
			</div>
		</div>
	</div>
</body>
</html>
