<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>著者の追加</title>
<style>
	* {
		margin: 0;
		padding: 0;
		box-sizing: border-box;
	}

	body {
		font-family: 'Arial', 'Hiragino Sans', 'MS Pゴシック', sans-serif;
		background-color: #f5f5f5;
		color: #333;
		padding: 20px;
	}

	.container {
		max-width: 600px;
		margin: 0 auto;
		background-color: #ffffff;
		padding: 30px;
		border-radius: 8px;
		box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
	}

	h1 {
		color: #0097D4;
		font-size: 28px;
		margin-bottom: 30px;
		border-bottom: 3px solid #0097D4;
		padding-bottom: 15px;
		font-weight: bold;
	}

	/* エラーメッセージ */
	.error-list {
		background-color: #ffebee;
		border: 2px solid #d32f2f;
		color: #d32f2f;
		padding: 15px;
		border-radius: 4px;
		margin-bottom: 20px;
		list-style-position: inside;
	}

	.error-list li {
		margin: 5px 0;
		font-weight: 500;
	}

	/* フォーム */
	form {
		display: flex;
		flex-direction: column;
	}

	.form-group {
		margin-bottom: 20px;
		display: flex;
		flex-direction: column;
	}

	label {
		font-weight: bold;
		color: #333;
		margin-bottom: 8px;
		font-size: 14px;
	}

	input[type="text"],
	input[type="email"],
	textarea {
		padding: 12px;
		border: 2px solid #0097D4;
		border-radius: 4px;
		font-size: 14px;
		color: #333;
		background-color: #f9f9f9;
		transition: all 0.3s ease;
		font-family: 'Arial', 'Hiragino Sans', 'MS Pゴシック', sans-serif;
	}

	input[type="text"]:focus,
	input[type="email"]:focus,
	textarea:focus {
		outline: none;
		border-color: #0077B6;
		background-color: #ffffff;
		box-shadow: 0 0 8px rgba(0, 119, 182, 0.3);
	}

	textarea {
		resize: vertical;
		min-height: 100px;
	}

	/* ボタン */
	button {
		padding: 12px;
		background-color: #0097D4;
		color: #ffffff;
		border: 2px solid #0077B6;
		border-radius: 4px;
		font-weight: bold;
		font-size: 16px;
		cursor: pointer;
		transition: all 0.3s ease;
		margin-top: 10px;
	}

	button:hover {
		background-color: #0077B6;
		box-shadow: 0 4px 12px rgba(0, 119, 182, 0.3);
	}

	button:active {
		transform: scale(0.98);
	}

	/* リンク */
	.btn-back {
		display: inline-block;
		padding: 10px 20px;
		background-color: #f5f5f5;
		color: #0097D4;
		border: 2px solid #0097D4;
		text-decoration: none;
		border-radius: 4px;
		font-weight: bold;
		transition: all 0.3s ease;
		margin-bottom: 20px;
	}

	.btn-back:hover {
		background-color: #0097D4;
		color: #ffffff;
	}

	@media (max-width: 600px) {
		.container {
			padding: 20px;
		}

		h1 {
			font-size: 24px;
		}
	}
</style>
</head>
<body>
	<div class="container">
		<h1>著者の追加</h1>

		<!-- エラーメッセージ -->
		<ul th:if="${errors != null && !errors.isEmpty()}" class="error-list">
			<li th:each="data:${errors}">[[${data}]]</li>
		</ul>

		<!-- 戻るボタン -->
		<a class="btn-back" th:href="@{/admin/}">管理者メニューに戻る</a>

		<!-- 著者追加フォーム -->
		<form action="/admin/writers" method="post">
			<div class="form-group">
				<label for="writerName">著者名 <span style="color: #d32f2f;">*</span></label>
				<input type="text" id="writerName" name="writerName" placeholder="著者の名前を入力" th:value="${writerName}" required>
			</div>

			<div class="form-group">
				<label for="writerDescription">著者紹介文</label>
				<textarea id="writerDescription" name="writerDescription" placeholder="著者について説明してください" th:value="${writerDescription}"></textarea>
			</div>

			<button type="submit">登録</button>
		</form>
	</div>
</body>
</html>
