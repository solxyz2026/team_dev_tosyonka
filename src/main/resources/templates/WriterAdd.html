<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>著者の追加</title>
<link rel="stylesheet" href="/css/WriterAddStyle.css">
</head>
<body>
	<div class="container">
		<h1>著者の追加</h1>

		<!-- エラーメッセージ -->
		<ul th:if="${errors != null && !errors.isEmpty()}" class="error-list">
			<li th:each="data:${errors}">[[${data}]]</li>
		</ul>

		<!-- 戻るボタン -->
		<a class="btn-back" th:href="@{/admin/}">管理者メニューに戻る</a>

		<!-- 著者追加フォーム -->
		<form action="/admin/writers" method="post">
			<div class="form-group">
				<label for="writerName">著者名 <span style="color: #d32f2f;">*</span></label>
				<input type="text" id="writerName" name="writerName" placeholder="著者の名前を入力" th:value="${writerName}">
			</div>

			<div class="form-group">
				<label for="writerDescription">著者紹介文 <span style="color: #d32f2f;">*</span></label>
				<textarea id="writerDescription" name="writerDescription" placeholder="著者について説明してください" >[[${writerDescription}]]</textarea>
			</div>

			<button type="submit">登録</button>
		</form>
	</div>
</body>
</html>
