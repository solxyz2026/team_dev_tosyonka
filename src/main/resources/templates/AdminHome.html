<!--大森-->

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>管理者画面</title>
	<link rel="stylesheet" href="/css/style.css">
</head>

<body>
	<!--リンク-->
	<article>
		<div class="side">
			<br><br>
			<a href="/admin/logout">ログアウト</a><br><br>
			<a href="/user/">ホームページ</a><br><br>
			<a href="/admin/books">在庫一覧</a><br><br>
			<a href="/admin/books/add">本追加</a><br><br>
			<a href="/admin/writers">著者の追加</a><br><br>
			<a href="/admin/categories">カテゴリー追加</a><br><br>
			<a href="/admin/reservations">予約一覧</a><br><br>
			<a href="/admin/loans">貸し出し状況</a><br><br>
		</div>
		<div class="content">
			<h1>管理者画面</h1>
			<h2>貸し出し</h2>

			<form action="/admin/books/search" method="post">
				本の登録ID　　<input type="text" name="book_id">
				<button>検索</button>

				<table border="1">
					<tr>
						<th>ID</th>
						<th>タイトル</th>
						<th>著者</th>
						<th>カテゴリー</th>
						<th>タグ</th>
					</tr>
					<tr th:each="details:${detail}">
						<td>[[${details.book.title}]]</td>
						<td>[[${details.status}]]</td>
					</tr>
				</table>
				<br>
			</form>
			<formform action="/admin/-/-" method="post">
				<button>追加</button>
				</form>
				<hr>

				<form action="/admin/user/search" method="post">
					<!--		URLマッピングにユーザID検索っぽいのが見つからない-->
					貸し出し内容
					<table border="1">
						<tr>
							<th>ID</th>
							<th>タイトル</th>
							<th>著者</th>
							<th>カテゴリー</th>
							<th>タグ</th>
						</tr>
						<tr th:each="details:${detail}">
							<td>[[${details.book.title}]]</td>
							<td>[[${details.status}]]</td>
						</tr>
					</table>

					ユーザID　　<input type="text" name="user_id">
					<button>検索</button>
				</form>

				<form action="/admin/-/-" method="post">
					<button>確定</button>
				</form>
		</div>
	</article>
</body>

</html>
