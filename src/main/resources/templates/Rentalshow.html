<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>貸し出し一覧</title>
	<link rel="stylesheet" href="/css/RentalshowStyle.css">
	<script>
		let targetForm = null;

		function returnConfirm(event, form) {
		    event.preventDefault();

		    targetForm = form;

		    const modal = document.getElementById("returnModal");
		    modal.classList.add("show");

		    return false;
		}

		function closeReturnModal() {
		    document.getElementById("returnModal")
		        .classList.remove("show");

		    targetForm = null;
		}

		function executeReturn() {
		    if (!targetForm) return;

		    targetForm.submit();
		}
	</script>
</head>
<body>
	<div class="layout">
		<div class="side">
			<div class="site-title">としょんか</div>
			<a href="/admin/logout">ログアウト</a>
			<a href="/admin/">ホーム画面</a>
			<a href="/admin/search">在庫一覧</a>
			<a href="/admin/books/add">本追加</a>
			<a href="/admin/writers">著者の追加</a>
			<a href="/admin/categories">カテゴリー追加</a>
			<a href="/admin/reservations">予約一覧</a>
			<a href="/admin/writers/list">著者一覧</a>
			<a href="/admin/users">利用者一覧</a>
			<a href="/admin/announcement">お知らせ</a>
		</div>

		<div class="main">
			<div class="header-section">
				<h1>📖 貸し出し一覧</h1>
			</div>

			<!-- 名前で絞り込み検索 -->
			<div class="search-section">
				<form action="/admin/rental" method="get" class="search-form">
					<label for="keyword">利用者名で絞り込み</label>
					<input type="text" id="keyword" name="keyword"
						th:value="${keyword}" placeholder="利用者名を入力">
					<button type="submit" class="btn-search">🔍 検索</button>
					<a href="/admin/rental" class="btn-clear">クリア</a>
				</form>
			</div>

			<div class="table-container">
				<table>
					<thead>
						<tr>
							<th>📚 本一覧</th>
							<th>ユーザID</th>
							<th>利用者名</th>
							<th>返却期限</th>
							<th>操作</th>
						</tr>
					</thead>
					<tbody>
						<tr th:if="${rentalList != null && !rentalList.isEmpty()}" th:each="rental : ${rentalList}">
							<td>
								<ul>
									<li th:each="detail : ${rental.rentaldetail}">
										[[${detail.book.title}]]
									</li>
								</ul>
							</td>
							<td>[[${rental.user.id}]]</td>
							<td>[[${rental.user.name}]]</td>
							<td>[[${#temporals.format(rental.dropDate, 'yyyy-MM-dd')}]]</td>
							<td>
								<form th:action="@{/admin/rental/{rentalId}/return(rentalId=${rental.id})}"
									method="post"
									onsubmit="return returnConfirm(event,this);">
									<button type="submit" class="btn-return">返却</button>
								</form>
							</td>
						</tr>

						<tr th:if="${rentalList == null || rentalList.isEmpty()}">
							<td colspan="5" class="empty-message">
								<p th:if="${keyword != null && !keyword.isEmpty()}">
									「<span th:text="${keyword}"></span>」に一致する貸し出しはありません
								</p>
								<p th:if="${keyword == null || keyword.isEmpty()}">
									現在、貸し出し中の本はありません
								</p>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>
	</div>
	<!-- ==========================
	     返却確認モーダル
	     ========================== -->
		 <div id="returnModal" class="custom-modal">
		 	<div class="custom-modal-content">

		 		<div class="custom-modal-header">
		 			📚 返却確認
		 		</div>

		 		<div class="custom-modal-body">
		 			<p>
		 				返却処理を実行します。<br>
		 				よろしいですか？
		 			</p>
		 		</div>

		 		<div class="custom-modal-footer">
		 			<button type="button"
		 				class="modal-btn cancel-btn"
		 				onclick="closeReturnModal()">
		 				キャンセル
		 			</button>

		 			<button type="button"
		 				class="modal-btn ok-btn"
		 				onclick="executeReturn()">
		 				返却する
		 			</button>
		 		</div>

		 	</div>
		 </div>
</body>
</html>
