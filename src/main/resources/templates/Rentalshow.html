<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>貸し出し一覧</title>
	<link rel="stylesheet" href="/css/RentalshowStyle.css">
</head>

<body>
	<header>〇〇図書館　管理者</header>

	<main>
		<div class="header-section">
			<h1>📖 貸し出し一覧</h1>
			<a class="btn" th:href="@{/admin/}">管理者メニューに戻る</a>
		</div>

		<div class="table-container">
			<table>
				<thead>
					<tr>
						<th>📚 本一覧</th>
						<th>ユーザID</th>
						<th>利用者名</th>
						<th>返却期限</th>
						<th>操作</th>
					</tr>
				</thead>
				<tbody>
					<tr th:if="${rentalList != null && !rentalList.isEmpty()}" th:each="rental : ${rentalList}">
						<!-- 本はまとめて表示 -->
						<td>
							<ul>
								<li th:each="detail : ${rental.rentaldetail}">
									[[${detail.book.title}]]
								</li>
							</ul>
						</td>

						<td>[[${rental.user.id}]]</td>
						<td>[[${rental.user.name}]]</td>
						<td>[[${#temporals.format(rental.dropDate, 'yyyy-MM-dd')}]]</td>

						<td>
							<form th:action="@{/admin/rental/{rentalId}/return(rentalId=${rental.id})}" method="post" onsubmit="return confirm('返却処理を実行しますか？');">
								<button type="submit" class="btn-return">返却</button>
							</form>
						</td>
					</tr>

					<!-- 貸出がない場合 -->
					<tr th:if="${rentalList == null || rentalList.isEmpty()}">
						<td colspan="5" class="empty-message">
							<p>現在、貸し出し中の本はありません</p>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</main>
</body>

</html>
