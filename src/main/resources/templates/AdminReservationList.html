<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>貸し出し一覧</title>
	<link rel="stylesheet" href="/css/AdminReservationListStyle.css">
</head>

<body>
	<header>としょんか　管理者</header>

	<main>
		<div class="header-section">
			<h1>📖 現在の予約一覧</h1>
		</div>
		<a class="btn-back" th:href="@{/admin/}">管理者メニューに戻る</a>

		<div class="table-container">
			<table>
				<thead>
					<tr>
						<th>📚 本一覧</th>
						<th>ユーザID</th>
						<th>利用者名</th>
						<th>予約削除</th>
					</tr>
				</thead>
				<tbody>
				    <th:block th:if="${reservationsList != null}">
				        <th:block th:each="reservation : ${reservationsList}">
				            <tr th:each="detail : ${reservation.reservationdetails}">
				                <td>[[${detail.book.title}]]</td>
				                <td>[[${reservation.user.id}]]</td>
				                <td>[[${reservation.user.name}]]</td>
				                <td>
				                    <form th:action="@{/admin/reservation/delete/{id}(id=${reservation.id})}" method="post">
				                        <button type="submit">削除</button>
				                    </form>
				                </td>
				            </tr>
				        </th:block>
				    </th:block>
				    
				    <tr th:if="${#lists.isEmpty(reservationsList)}">
				        <td colspan="4" class="empty-message">
				            <p>現在、予約中の本はありません</p>
				        </td>
				    </tr>
				</tbody>
			</table>
		</div>
	</main>
</body>

</html>
