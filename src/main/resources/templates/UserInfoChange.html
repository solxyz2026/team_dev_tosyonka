<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>会員情報変更</title>
	<link rel="stylesheet" href="/css/style.css">
</head>

<body>
	<h3>会員情報変更</h3>
	<form action="/user/edit" method="post">
		　　　名前　<input type="text" name="name" th:value="${user.name}"><br>
		生年月日 <input type="date" name="birthday" th:value="${user.birthday}">
		電話番号 <input type="text" name="telNumber" th:value="${user.telNumber}">
		メールアドレス　<input type="text" name="email" th:value="${user.email}"><br>
		　パスワード　<input type="text" name="password" th:value="${user.password}"><br>
		<br>
		<button>変更</button>
	</form>
	<br>
	<a href="/user/mypage">マイページに戻る</a><br>
</body>

</html>
