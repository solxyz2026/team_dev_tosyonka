<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>予約</title>
<link rel="stylesheet" href="/css/myReservationsStyle.css">
</head>
<body>
	<div class="container">
		
		
		<!-- サイドバー -->
		<div class="sidebar">
			<div class="site-title">としょんか</div>
			<a href="/user/logout">ログアウト</a>
			<a href="/user/">トップページ</a>
			<a href="/user/mypage">マイページ</a>
			<a href="/user/search">本検索</a>
		</div>

		<!--ヘッダー-->
			<h1>としょんか</h1>
			<h2>予約</h2>
		<!-- メッセージ -->
		<div th:if="${msg}" class="message">
			<span th:text="${msg}"></span>
		</div>

		<!-- 予約一覧 -->
		<div class="section-title">予約する本一覧</div>
		<table border="1">
			<tr>
				<th>タイトル</th>
				<th>著者</th>
				<th>カテゴリー</th>
				<th>削除</th>
			</tr>
			<tr th:each="book:${books}">
				<td>[[${book.title}]]</td>
				<td>[[${book.writer.writerName}]]</td>
				<td>[[${book.category.categoryName}]]</td>
				<td>
					<form th:action="|/user/reservation/${book.id}/delete|" method="post">
						<button type="submit">削除</button>
					</form>
				</td>
			</tr>
		</table>
		
		<p th:text = "${error}"></p>

		<!-- 予約確定ボタン -->
		<form action="/user/reservations" method="post">
			<button type="submit" class="confirm-button">予約確定</button>
		</form>
	</div>
</body>
</html>
