<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>予約</title>
</head>
<body>
	<!--大森-->
	<h1>予約</h1>
	<div>としょんか</div>
			
	<!--リンク-->
	<div>
		<a href="/user/logout">ログアウト</a><br>
		<a href="/user/">トップページ</a><br>
		<a href="/user/mypage">マイページ</a><br>
		<a href="/user/search">本検索</a>
	</div>
	<br>
	
	<!--予約一覧-->
	<div>予約する本一覧</div>
	<form action="/user/reservations" method="post">
		<table border="1">
			<tr>
				<td>タイトル</td>
				<td>著者</td>
				<td>カテゴリー</td>
				<td>削除</td>
			</tr>
			<tr th:each="book:${books}">
				<td>[[${book.title}]]</td>
				<td>[[${book.writer.writerName}]]</td>
				<td>[[${book.category.categoryName}]]</td>
				<td>×</td>
			</tr>
		</table><br>
		<button>予約確定</button>
	</form>
	

</body>
</html>
