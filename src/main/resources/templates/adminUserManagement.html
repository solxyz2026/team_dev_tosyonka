<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>利用者一覧</title>
<style>
	* {
		margin: 0;
		padding: 0;
		box-sizing: border-box;
	}

	body {
		font-family: 'Arial', 'Hiragino Sans', 'MS Pゴシック', sans-serif;
		background-color: #f5f5f5;
		color: #333;
		padding: 20px;
	}

	.container {
		max-width: 700px;
		margin: 0 auto;
		background-color: #ffffff;
		padding: 30px;
		border-radius: 8px;
		box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
	}

	h1 {
		color: #0097D4;
		font-size: 28px;
		margin-bottom: 30px;
		border-bottom: 3px solid #0097D4;
		padding-bottom: 15px;
		font-weight: bold;
	}

	/* メッセージ */
	.message {
		background-color: #e8f5e9;
		border: 2px solid #4CAF50;
		color: #2e7d32;
		padding: 15px;
		border-radius: 4px;
		margin-bottom: 20px;
		font-weight: 500;
	}

	.message.error {
		background-color: #ffebee;
		border-color: #d32f2f;
		color: #d32f2f;
	}

	/* ボタン */
	.btn-back {
		display: inline-block;
		padding: 10px 20px;
		background-color: #0097D4;
		color: #ffffff;
		border: 2px solid #0077B6;
		text-decoration: none;
		border-radius: 4px;
		font-weight: bold;
		transition: all 0.3s ease;
		margin-bottom: 20px;
		cursor: pointer;
	}

	.btn-back:hover {
		background-color: #0077B6;
		box-shadow: 0 4px 12px rgba(0, 119, 182, 0.3);
	}

	/* テーブル */
	table {
		width: 100%;
		border-collapse: collapse;
		margin: 20px 0;
		background-color: #ffffff;
		box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
		border-radius: 6px;
		overflow: hidden;
	}

	table thead {
		border: 1px solid #0097D4;
	}

	table th {
		padding: 12px 15px;
		text-align: left;
		font-weight: bold;
		background-color: #004B7A;
		color: #ffffff;
		border-right: 1px solid #0077B6;
	}

	table th:last-child {
		border-right: none;
	}

	table td {
		padding: 12px 15px;
		border: 1px solid #ddd;
		color: #333;
		font-size: 13px;
	}

	table tbody tr:nth-child(even) {
		background-color: #f9f9f9;
	}

	table tbody tr:nth-child(odd) {
		background-color: #ffffff;
	}

	table tbody tr:hover {
		background-color: #e8f4f8;
		transition: background-color 0.2s ease;
	}

	/* 削除ボタン */
	.btn-delete {
		padding: 6px 12px;
		background-color: #d32f2f;
		color: #ffffff;
		border: 2px solid #b71c1c;
		border-radius: 4px;
		font-weight: bold;
		font-size: 12px;
		cursor: pointer;
		transition: all 0.3s ease;
		white-space: nowrap;
	}

	.btn-delete:hover {
		background-color: #c62828;
		box-shadow: 0 2px 8px rgba(198, 40, 40, 0.3);
	}

	.btn-delete:active {
		transform: scale(0.98);
	}

	form {
		display: inline;
	}

	/* 空の状態 */
	.empty-message {
		text-align: center;
		padding: 40px;
		color: #999;
		font-size: 16px;
	}

	@media (max-width: 600px) {
		.container {
			padding: 20px;
			max-width: 100%;
		}

		h1 {
			font-size: 24px;
		}

		table th,
		table td {
			padding: 8px;
			font-size: 11px;
		}

		table {
			overflow-x: auto;
			display: block;
		}

		.btn-delete {
			padding: 4px 8px;
			font-size: 10px;
		}
	}
</style>
</head>
<body>
	<div class="container">
		<h1>利用者一覧</h1>
		<a class="btn-back" th:href="@{/admin/}">管理者メニューに戻る</a>

		<table border="1">
			<thead>
				<tr>
					<th>ユーザID</th>
					<th>名前</th>
					<th>メールアドレス</th>
					<th>電話番号</th>
					<th>削除</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="user:${usersList}">
					<td th:text="${user.id}">1</td>
					<td th:text="${user.name}">山田太郎</td>
					<td th:text="${user.email}">yamada@example.com</td>
					<td th:text="${user.telNumber}">09012345678</td>
					<td style="text-align: center;">
						<form th:action="|/admin/${user.id}/delete|" method="post" onsubmit="return confirm('削除しますか？');">
							<button type="submit" class="btn-delete">削除</button>
						</form>
					</td>
				</tr>
			</tbody>
		</table>
	</div>
</body>
</html>
