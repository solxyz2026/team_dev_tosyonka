<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>本詳細</title>
	<link rel="stylesheet" href="/css/AdminBookDetailStyle.css">
	<script>
		function keikoku(){
			let judge = confirm("一度削除したら戻せません。本当に削除しますか？");
		
			return judge;
				
			}
		</script>
</head>

<body>
	<div class="container">
		<!-- エラーメッセージ -->
		<div th:if="${error}" class="error">
			<p th:text="${error}"></p>
			<a class="btn" th:href="@{/user/search}">検索ページに戻る</a>
		</div>

		<!-- 本の詳細情報 -->
		<div th:if="${book}">
			<!-- タイトル -->
			<h1 th:text="${book.title}">本のタイトル</h1>

			<!-- 詳細情報テーブル -->
			<table>
				<tr>
					<th>ID</th>
					<td th:text="${book.id}">1</td>
				</tr>
				<tr>
					<th>著者</th>
					<td th:text="${book.writer.writerName}">著者名</td>
				</tr>
				<tr>
					<th>著者説明</th>
					<td th:text="${book.writer.writerDescription}">著者の説明文</td>
				</tr>
				<tr>
					<th>出版社</th>
					<td th:text="${book.publisher}">出版社名</td>
				</tr>
				<tr>
					<th>出版日</th>
					<td th:text="${book.date}">2020-01-01</td>
				</tr>
				<tr>
					<th>カテゴリ</th>
					<td th:text="${book.category.categoryName}">カテゴリ名</td>
				</tr>
				<tr>
					<th>貸出状況</th>
					<td>
						<span th:if="${book.loans}">貸出中</span>
						<span th:unless="${book.loans}">利用可能</span>
					</td>
				</tr>
			</table>

			<!-- 本の説明セクション -->
			<div th:if="${book.summary}" class="summary-section">
				<h3>本の説明</h3>
				<p th:text="${book.summary}">本の説明文がここに表示されます。</p>
			</div>

			<!-- レビュー -->
			<table border="1">
				<tr th:each="review:${reviews}">
					<td><img src="/image/kkrn_icon_user_1.png" alt="画像なし" class="icon">　[[${review.bookReview}]]</td>
					<td>
						<form th:action="|/admin/reviews/${review.id}/delete|" method="post" onsubmit="return keikoku();">
							<button class="btn btn-delete">削除</button>
						</form>
					</td>
				</tr>
				</table>

				<!-- ボタングループ -->
				<div class="button-group">

					<a class="btn" th:href="@{/admin/search}">検索ページに戻る</a>
					<form th:action="@{/admin/{book_id}/delete(book_id=${book.id})}" method="post">
						<button class="btn">削除</button>
					</form>

				</div>
		</div>
	</div>
</body>

</html>
