<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>著者一覧</title>
<link rel="stylesheet" href="/css/WriterShowStyle.css">
</head>
<body>
	<header>としょんか　管理者</header>
	<div class="container">
		<h1>著者一覧</h1>

		<!-- メッセージ表示 -->
		<div th:if="${message}" class="message" th:classappend="${#strings.contains(message, 'エラー')} ? 'error'">
			[[${message}]]
		</div>

		<!-- 戻るボタン -->
		<a class="btn-back" th:href="@{/admin/}">管理者メニューに戻る</a>

		<!-- 著者一覧テーブル -->
		<table th:if="${writerList != null && !writerList.isEmpty()}">
			<thead>
				<tr>
					<th>著者ID</th>
					<th>著者名</th>
					<th>著者紹介文</th>
					<th style="width: 100px;">操作</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="writer:${writerList}">
					<td th:text="${writer.id}">1</td>
					<td th:text="${writer.writerName}">太郎</td>
					<td th:text="${writer.writerDescription}">著者の説明</td>
					<td style="text-align: center;">
						<form th:action="@{/admin/writers/list/{id}/delete(id=${writer.id})}" method="post" onsubmit="return confirm('削除しますか？');">
							<input type="hidden" name="writerName" th:value="${writer.writerName}">
							<button type="submit" class="btn-delete">削除</button>
						</form>
					</td>
				</tr>
			</tbody>
		</table>

		<!-- 著者がない場合 -->
		<div th:if="${writerList == null || writerList.isEmpty()}" class="empty-message">
			著者がまだ登録されていません。
		</div>
	</div>
</body>
</html>
